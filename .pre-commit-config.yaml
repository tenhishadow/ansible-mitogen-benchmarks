repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb", "50"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # why not... :)
  - repo: local
    hooks:
      - id:             ansible-lint
        name:           ansible lint
        entry:          go-task lint
        language:       system
        pass_filenames: false
        always_run:     true
